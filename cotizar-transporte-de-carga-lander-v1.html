    display: none !important;
  }
  </style>
  
  <script>
  (function() {
    let currentStep = 1;
    const totalSteps = 5;
    const formData = {};
      
    function updateProgress() {
      const progress = ((currentStep - 1) / totalSteps) * 100;
      document.querySelector('.progress-bar').style.width = progress + '%';
      document.querySelector('.progress-text').textContent = Math.round(progress) + '%';
    }
  
    function updateHeader(title, subtitle) {
      document.querySelector('.quiz-title').textContent = title;
      document.querySelector('.quiz-subtitle').textContent = subtitle;
    }
  
    function updateBackButton() {
      const backBtn = document.getElementById('backBtn');
      if (currentStep === 1 || currentStep === 6) {
        backBtn.style.display = 'none';
      } else {
        backBtn.style.display = 'block';
      }
    }
  
    function showSlide(step, direction = 'forward') {
      const allSlides = document.querySelectorAll('.question-slide');
      const currentSlide = document.querySelector(`[data-step="${currentStep}"]`);
      const targetSlide = document.querySelector(`[data-step="${step}"]`);
      
      if (!targetSlide) return;
  
      // Añadir clase de salida
      if (currentSlide) {
        currentSlide.classList.add('exit');
        currentSlide.classList.remove('active');
      }
  
      // Pequeño delay para la transición
      setTimeout(() => {
        allSlides.forEach(slide => {
          slide.style.display = 'none';
          slide.classList.remove('active', 'exit');
        });
  
        targetSlide.style.display = 'block';
        
        // Forzar reflow
        targetSlide.offsetHeight;
        
        targetSlide.classList.add('active');
        
        const title = targetSlide.dataset.title;
        const subtitle = targetSlide.dataset.subtitle;
        updateHeader(title, subtitle);
        document.querySelector('.quiz-content').scrollTop = 0;
      }, direction === 'back' ? 200 : 100);
  
      updateProgress();
      updateBackButton();
    }
  
    function nextStep() {
      if (currentStep < 6) {
        const prevStep = currentStep;
        currentStep++;
        showSlide(currentStep, 'forward');
      }
    }
  
    function prevStep() {
      if (currentStep > 1) {
        const prevStep = currentStep;
        currentStep--;
        showSlide(currentStep, 'back');
      }
    }
  
    // Botón volver
    document.getElementById('backBtn').addEventListener('click', prevStep);
  
    // Validar celular chileno (solo números, 8 dígitos)
    function validarCelular(celular) {
      const regex = /^[0-9]{8}$/;
      return regex.test(celular);
    }
  
    // Validar email
    function validarEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }
  
    // Formatear input de celular (solo números)
    document.getElementById('celular').addEventListener('input', function(e) {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
  
    // Pregunta 1: Región Origen
    document.querySelectorAll('.region-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        formData.regionOrigen = this.dataset.value;
        setTimeout(() => nextStep(), 300);
      });
    });
  
    // Pregunta 2: Región Destino
    document.querySelectorAll('.region-destino-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.region-destino-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        formData.regionDestino = this.dataset.value;
        setTimeout(() => nextStep(), 300);
      });
    });
  
    // Pregunta 3: Categoría
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        formData.categoria = this.dataset.value;
        setTimeout(() => nextStep(), 300);
      });
    });
  
    // Pregunta 4: Detalles
    document.querySelector('[data-step="4"] .next-btn').addEventListener('click', function() {
      const mensaje = document.getElementById('mensaje').value.trim();
      if (!mensaje) return;
      formData.mensaje = mensaje;
      nextStep();
    });
  
    // Submit final con validación
    document.getElementById('submitBtn').addEventListener('click', function() {
      const nombre = document.getElementById('nombreCompleto').value.trim();
      const celular = document.getElementById('celular').value.trim();
      const email = document.getElementById('email').value.trim();
      
      let valido = true;
  
      // Resetear errores
      document.querySelectorAll('input').forEach(input => input.classList.remove('error'));
      document.querySelectorAll('[id^="error"]').forEach(span => span.style.display = 'none');
  
      // Validar nombre
      if (!nombre || nombre.length < 3) {
        document.getElementById('nombreCompleto').classList.add('error');
        document.getElementById('errorNombre').style.display = 'block';
        valido = false;
      }
  
      // Validar celular
      if (!validarCelular(celular)) {
        document.getElementById('celular').classList.add('error');
        document.getElementById('errorCelular').style.display = 'block';
        valido = false;
      }
  
      // Validar email
      if (!validarEmail(email)) {
        document.getElementById('email').classList.add('error');
        document.getElementById('errorEmail').style.display = 'block';
        valido = false;
      }
  
      if (!valido) return;
  
      // Guardar datos
      formData.nombreCompleto = nombre;
      formData.celular = '+569' + celular;
      formData.email = email;

      // Completar los campos en el otro formulario con los valores ingresados por el usuario en el quiz
      const upFormCampos = [
        { idQuiz: 'nombreCompleto', idUpForm: 'FNAMEUPFORM' },
        { idQuiz: 'celular', idUpForm: 'TELUPFORM' },
        { idQuiz: 'email', idUpForm: 'EMAILUPFORM' },
        { idQuiz: 'categoria', idUpForm: 'CATEGORIAUPFORM' },
        { idQuiz: 'regionOrigen', idUpForm: 'Region-de-origen-id' },
        { idQuiz: 'regionDestino', idUpForm: 'REGIONDESTINOUPFORM' },
        { idQuiz: 'mensaje', idUpForm: 'message' },
        { idQuiz: 'none', idUpForm: 'ORIGENUPFORM' },
      ];

      upFormCampos.forEach(campo => {
        if (document.getElementById(campo.idQuiz)) {
          const valor = document.getElementById(campo.idQuiz)?.value.trim();
          const upInput = document.getElementById(campo.idUpForm);
          upInput.value = valor;
        } else if(campo.idUpForm == 'ORIGENUPFORM') {
          const valor = 'COTIZAR-TRANSPORTE-DE-CARGA';
          const upInput = 'COTIZAR-TRANSPORTE-DE-CARGA';
          upInput.value = valor;
        }
      });

      const UPsubmitButton = document.querySelector(
          '.button.js-submit-button.button--alt-accent-bg'
      );

      UPsubmitButton.click();
      
      nextStep(); // Mostrar confirmación
    });
  
    // Inicializar
    updateProgress();
    updateBackButton();
    showSlide(1);
  })();
  </script>
